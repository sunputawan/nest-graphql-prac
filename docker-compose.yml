version: '3.8'

services:
  mongo:
    image: mongo:latest
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27018:27017"
    volumes:
      - "mongo-data:/data/db"

volumes:
  mongo-data:
    driver: local

networks:
  mongo_net:
    driver: bridge

  